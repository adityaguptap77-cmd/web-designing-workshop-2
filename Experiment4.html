<html>
<head>
<title>Student Result Calculator</title>
</head>
<style>
    .container{
         text-align: center;
         background: rgb(255, 255, 255);
            padding: 20px;
            width: 350px;
            margin-top: auto;
            margin: auto;
            border-radius: 10px;
            box-shadow:0 0 5px rgb(0, 0, 0);
    }
</style>

<body>
<div class="container">
<h2>Student Result Calculator</h2>

<label>Enter Number of Subjects:</label>
<input type="number" id="subjects">
<br><br>

<button onclick="calculateResult()">Calculate Result</button>

<h3 id="output"></h3>
</div>

<script>

function calculateResult()
{
    let n = document.getElementById("subjects").value;

    alert("Enter marks for " + n + " subjects");

    let total = 0;

    for(let i=1; i<=n; i++)
    {
        let marks = prompt("Enter marks for Subject " + i);
        total = total + parseFloat(marks);
    }

    let average = total / n;
    let grade;

    if(average >= 90)
        grade = "A+";
    else if(average >= 75)
        grade = "A";
    else if(average >= 60)
        grade = "B";
    else if(average >= 50)
        grade = "C";
    else
        grade = "F";

    document.getElementById("output").innerHTML =
    "Total Marks: " + total + "<br>" +
    "Average Marks: " + average.toFixed(2) + "<br>" +
    "Grade: " + grade;

}

</script>

</body>
</html>
